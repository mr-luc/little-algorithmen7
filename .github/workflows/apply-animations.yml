name: Apply animation changes

on:
  push:
    branches:
      - codex/fix-mission-logic

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply and verify animation changes
        shell: bash
        run: |
          cat <<'PATCH' | base64 --decode | gzip --decompress > /tmp/codex-animation.patch
          
          PATCH
          git apply --index /tmp/codex-animation.patch
          node --check script.js
          node --test tests/game-content.test.mjs
          rm .github/workflows/apply-animations.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Add engaging game animations"
          git push
